worker_processes 1;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Masquer la version de Nginx
    server_tokens off;

    # -------------------------------------------------------
    #  Upstream services
    # -------------------------------------------------------
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream caldav {
        server caldav:5232;
    }

    # -------------------------------------------------------
    #  HTTP → HTTPS redirect (en prod)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # En dev : pas de redirect
        # En prod : décommenter la ligne suivante
        # return 301 https://$host$request_uri;

        # -------------------------------------------------------
        #  Security Headers
        # -------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # HSTS — activé par défaut (safe même en HTTP, le navigateur l'ignorera sans HTTPS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Limiter la taille des requêtes (protection upload abusif)
        client_max_body_size 10m;

        # SumUp webhooks — bypass auth (signature vérifiée côté backend)
        location /api/webhooks/sumup {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # API Backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # CalDAV — Apple Calendar
        location /caldav/ {
            proxy_pass http://caldav/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Headers requis pour CalDAV
            proxy_set_header X-Script-Name /caldav;
            proxy_pass_header Authorization;
        }

        # Frontend React (static)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
