worker_processes 1;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # -------------------------------------------------------
    #  Upstream services
    # -------------------------------------------------------
    upstream backend {
        server backend:8000;
    }

    upstream caldav {
        server caldav:5232;
    }

    # -------------------------------------------------------
    #  HTTP → HTTPS redirect (en prod)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # En dev : pas de redirect
        # En prod : décommenter la ligne suivante
        # return 301 https://$host$request_uri;

        # SumUp webhooks — bypass tout
        location /api/webhooks/sumup {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # API Backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # CalDAV — Apple Calendar
        location /caldav/ {
            proxy_pass http://caldav/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Headers requis pour CalDAV
            proxy_set_header X-Script-Name /caldav;
            proxy_pass_header Authorization;
        }

        # Frontend React (static)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
