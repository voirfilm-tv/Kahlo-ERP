# ============================================================
#  KAHLO CAFÉ — ERP Stack
#  RAM cible : ~400MB en usage normal (sans Gemini API)
#  Machine : 4GB RAM / Ubuntu
# ============================================================

services:

  # ----------------------------------------------------------
  #  PostgreSQL — Base de données principale
  #  RAM : ~80MB
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: kahlo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kahlo
      POSTGRES_USER: kahlo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Port non exposé sur l'hôte (accès uniquement via le réseau Docker)
    # Décommenter pour debug local :
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kahlo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  #  Redis — Cache, sessions, queue offline sync
  #  RAM : ~30MB
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kahlo_redis
    restart: unless-stopped
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec --save 900 1 --save 300 10 --save 60 10000 --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?REDIS_PASSWORD must be set}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  #  Backend — FastAPI (Python)
  #  RAM : ~120MB
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kahlo_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kahlo:${POSTGRES_PASSWORD}@db:5432/kahlo
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      SUMUP_API_KEY: ${SUMUP_API_KEY}
      SUMUP_CLIENT_ID: ${SUMUP_CLIENT_ID}
      SUMUP_CLIENT_SECRET: ${SUMUP_CLIENT_SECRET}
      SUMUP_WEBHOOK_SECRET: ${SUMUP_WEBHOOK_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BREVO_API_KEY: ${BREVO_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      APP_USERNAME: ${APP_USERNAME:-kahlo}
      # NE PAS utiliser APP_PASSWORD_HASH avec Docker Compose (les $ cassent les hashes bcrypt)
      APP_DEFAULT_PASSWORD: ${APP_DEFAULT_PASSWORD:-changeme}
      ADMIN_FORCE_RESET: ${ADMIN_FORCE_RESET:-false}
      SESSION_HOURS: ${SESSION_HOURS:-8}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://erp.kahlocafe.fr}
      BREVO_FROM_EMAIL: ${BREVO_FROM_EMAIL:-bonjour@kahlocafe.fr}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME:-Kahlo Café}
      BREVO_LIST_CLIENTS: ${BREVO_LIST_CLIENTS:-3}
      BREVO_LIST_RELANCE: ${BREVO_LIST_RELANCE:-7}
      BREVO_TPL_ANNIVERSAIRE: ${BREVO_TPL_ANNIVERSAIRE:-1}
      BREVO_TPL_CONFIRMATION: ${BREVO_TPL_CONFIRMATION:-2}
      BREVO_TPL_PRETE: ${BREVO_TPL_PRETE:-3}
      CALDAV_BASE_URL: http://caldav:5232
      CALDAV_USER: ${CALDAV_USER:-kahlo}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - factures_data:/app/factures
      - backups_data:/backups/kahlo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 200M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  #  CalDAV — Radicale (sync Apple + Google Calendar)
  #  RAM : ~30MB
  # ----------------------------------------------------------
  caldav:
    # Image communautaire — pinned par tag.
    # Pour pinner par digest (recommandé en prod), remplacer par :
    #   image: tomsquest/docker-radicale@sha256:<digest>
    # Si l'image disparaît de Docker Hub, basculer sur le build local :
    #   build: ./caldav
    image: tomsquest/docker-radicale:3.3.3.1
    container_name: kahlo_caldav
    restart: unless-stopped
    environment:
      CALDAV_USER: ${CALDAV_USER:-kahlo}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-changeme}
    entrypoint: ["/bin/sh", "/etc/radicale/init.sh"]
    volumes:
      - caldav_data:/data
      - ./nginx/radicale.conf:/etc/radicale/config:ro
      - ./nginx/radicale-init.sh:/etc/radicale/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5232/.web/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  #  Frontend — React (Vite) buildé en static
  #  RAM : ~20MB (nginx)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kahlo_frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  #  Nginx — Reverse proxy + SSL
  #  RAM : ~10MB
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: kahlo_nginx
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-127.0.0.1}:${HTTP_PORT:-80}:80"
      - "${BIND_HOST:-127.0.0.1}:${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      caldav:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
  caldav_data:
  uploads_data:
  factures_data:
  backups_data:

networks:
  default:
    name: kahlo_network
