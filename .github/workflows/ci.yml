name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite+aiosqlite://
      SECRET_KEY: ci-secret-key
      APP_DEFAULT_PASSWORD: changeme
      REDIS_URL: redis://localhost:6379/0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Smoke import FastAPI app
        run: python -c "from main import app; print(app.title)"

      - name: Run backend tests
        run: pytest -q

      - name: Build backend Docker image
        run: docker build -t kahlo-backend-ci -f Dockerfile .

  migrations:
    name: Alembic migrations on fresh PostgreSQL
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kahlo_ci
          POSTGRES_USER: kahlo
          POSTGRES_PASSWORD: kahlo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kahlo -d kahlo_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://kahlo:kahlo@localhost:5432/kahlo_ci
      SECRET_KEY: ci-secret-key
      APP_DEFAULT_PASSWORD: changeme
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Verify migration head reached
        run: alembic current

  frontend:
    name: Frontend (install + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build
